    const getDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const InAppPipWindow = ({ timeText, subtitle, onClose }) => {
      // 这里的 state 在组件不被销毁的情况下是稳定的，不会再因为 App 更新时间而复位
      const [pos, setPos] = useState({ x: window.innerWidth - 180, y: 80 });
      const [isDragging, setIsDragging] = useState(false);
      const startPos = useRef({ x: 0, y: 0 });

      const handleTouchStart = (e) => {
        setIsDragging(true);
        startPos.current = {
          x: e.touches[0].clientX - pos.x,
          y: e.touches[0].clientY - pos.y
        };
      };

      const handleTouchMove = (e) => {
        if (!isDragging) return;
        e.preventDefault(); 
        let newX = e.touches[0].clientX - startPos.current.x;
        let newY = e.touches[0].clientY - startPos.current.y;
        
        newX = Math.max(10, Math.min(window.innerWidth - 170, newX));
        newY = Math.max(10, Math.min(window.innerHeight - 90, newY));
        
        setPos({ x: newX, y: newY });
      };

      const handleTouchEnd = () => setIsDragging(false);

      return (
        <div 
          className="fixed z-[9999] bg-slate-900/95 dark:bg-slate-800/95 backdrop-blur-xl border border-slate-700/50 shadow-2xl rounded-2xl flex flex-col items-center justify-center p-3 select-none touch-none animate-fade-in"

      );

        const lineKey = line.replace("号线", "").replace("南海有轨", "有轨").replace("佛山", "佛");
        const dbKey = `${lineKey}-${dirIndex}`;
        
        const dirData = metroNetwork[line].directions[dirIndex];
        const stationIndex = dirData.stations.indexOf(station);

        const exactTimetableDB = {
          "1-0": { 0: {f: 360, l: 1375}, 15: {f: 395, l: 1410} }, 
          "1-1": { 0: {f: 370, l: 1410}, 15: {f: 405, l: 1445} }, 
          "2-0": { 0: {f: 360, l: 1410}, 23: {f: 410, l: 1460} },
          "2-1": { 0: {f: 360, l: 1395}, 23: {f: 410, l: 1445} },
          "3-0": { 0: {f: 360, l: 1375}, 19: {f: 415, l: 1430} }, 
          "3-1": { 0: {f: 370, l: 1410}, 19: {f: 425, l: 1465} }, 
          "7-0": { 0: {f: 360, l: 1370}, 4: {f: 370, l: 1400}, 27: {f: 430, l: 1460} }, 
          "7-1": { 0: {f: 360, l: 1370}, 23: {f: 380, l: 1433}, 27: {f: 390, l: 1445} }, 
          "8-0": { 0: {f: 360, l: 1380}, 25: {f: 425, l: 1445} },

          "11-0": { 0: {f: 360, l: 1380}, 28: {f: 420, l: 1440} },
          "11-1": { 0: {f: 360, l: 1380}, 28: {f: 420, l: 1440} },
          "18-0": { 0: {f: 375, l: 1395}, 4: {f: 382, l: 1412}, 7: {f: 395, l: 1430} }, 
          "18-1": { 0: {f: 360, l: 1350}, 3: {f: 372, l: 1389}, 7: {f: 390, l: 1415} }, 
          "广佛-0": { 0: {f: 360, l: 1350}, 24: {f: 420, l: 1410} },
          "广佛-1": { 0: {f: 360, l: 1380}, 24: {f: 420, l: 1440} },
          "佛2-0": { 0: {f: 360, l: 1350}, 16: {f: 405, l: 1395} },
          "佛2-1": { 0: {f: 360, l: 1380}, 16: {f: 405, l: 1425} },
          "有轨1-0": { 0: {f: 390, l: 1365}, 13: {f: 420, l: 1395} },
          "有轨1-1": { 0: {f: 390, l: 1365}, 13: {f: 420, l: 1395} }
        };

        let fMins = 360;
        let lMins = 1380;
        const exactLine = exactTimetableDB[dbKey];

        if (exactLine && exactLine[stationIndex]) {
            fMins = exactLine[stationIndex].f;
            lMins = exactLine[stationIndex].l;
        } else if (exactLine) {
            const indices = Object.keys(exactLine).map(Number).sort((a,b)=>a-b);
            let prevIdx = indices[0], nextIdx = indices[indices.length-1];
            for(let idx of indices) {
                if(idx <= stationIndex) prevIdx = idx;
                if(idx >= stationIndex && nextIdx === indices[indices.length-1]) nextIdx = idx;
            }
            if (prevIdx === nextIdx) {
                fMins = exactLine[prevIdx].f; lMins = exactLine[prevIdx].l;
            } else {
                const ratio = (stationIndex - prevIdx) / (nextIdx - prevIdx);
                fMins = Math.round(exactLine[prevIdx].f + (exactLine[nextIdx].f - exactLine[prevIdx].f) * ratio);
                lMins = Math.round(exactLine[prevIdx].l + (exactLine[nextIdx].l - exactLine[prevIdx].l) * ratio);
            }
        }

        const formatTime = (m) => {
            let h = Math.floor(m / 60);
            let min = Math.floor(m % 60);
            if (h >= 24) h -= 24;
            return `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
        };

        return { label: dayLabel, time: `${formatTime(fMins)} - ${formatTime(lMins)}`, isWeekend: isWeekend };
      };

      const generateTimetable = (line, directionIndex, station, baseDate) => {
        const hours = baseDate.getHours();
        const mins = baseDate.getMinutes();
        const timeInMins = hours * 60 + mins;
        const isPeak = (timeInMins >= 7.5*60 && timeInMins <= 9.5*60) || (timeInMins >= 17.5*60 && timeInMins <= 19.5*60);

        const intervalData = {
          "1号线": { peak: 2.5, offPeak: 4 }, "2号线": { peak: 2.5, offPeak: 4 }, "3号线": { peak: 2.0, offPeak: 3.5 },
          "7号线": { peak: 4.0, offPeak: 6.0 }, "8号线": { peak: 3.0, offPeak: 5.0 }, "11号线": { peak: 3.5, offPeak: 6.0 },
          "18号线": { peak: 7.5, offPeak: 9.0 }, "广佛线": { peak: 3.5, offPeak: 5.5 }, "佛山2号线": { peak: 5.5, offPeak: 8.0 }, "南海有轨1号线": { peak: 8.0, offPeak: 12.0 }
        };
        
        const config = intervalData[line] || { peak: 4, offPeak: 6 };
        const currentIntervalMins = isPeak ? config.peak : config.offPeak;

        const stationsArray = metroNetwork[line].directions[directionIndex].stations;
        const stationIndex = stationsArray.indexOf(station);
        
        const travelOffsetMins = stationIndex * 2.2;
        let lineHash = 0;
        const hashTarget = `${line}-${directionIndex}`;
        for (let i = 0; i < hashTarget.length; i++) { lineHash = (lineHash << 5) - lineHash + hashTarget.charCodeAt(i); lineHash |= 0; }
        const lineBaseOffset = Math.abs(lineHash) % currentIntervalMins; 
        
        const currentAbsoluteMins = hours * 60 + mins + (baseDate.getSeconds() / 60);
        const effectiveTerminusTime = currentAbsoluteMins - travelOffsetMins - lineBaseOffset;
        
        let timeToNextDeparture = currentIntervalMins - (effectiveTerminusTime % currentIntervalMins);
        if (timeToNextDeparture < 0) timeToNextDeparture += currentIntervalMins;
        if (timeToNextDeparture >= currentIntervalMins) timeToNextDeparture -= currentIntervalMins;

        let firstTrainWait = timeToNextDeparture;
        if (firstTrainWait <= 0.1) firstTrainWait += currentIntervalMins; 

        const times = [];
        let accumulatedMins = firstTrainWait;

        for (let i = 0; i < 12; i++) {
          const d = new Date(baseDate.getTime() + accumulatedMins * 60000);
          let isExpress = false;
          if (line === "18号线") {
             const expressSeed = Math.abs(lineHash + stationIndex + i) % 5;
             if (expressSeed === 0 && i !== 0) isExpress = true;
          }

          times.push({
            id: `t_${i}`,
            timeStr: `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`,
            label: i === 0 ? (isPeak ? "高峰进站" : "即将进站") : `后续`,
            isExpress: isExpress,
            dateObj: d
          });

          accumulatedMins += currentIntervalMins;
        }
        return times;
      };

        const handleTouchMove = (e) => {

          const deltaX = e.touches[0].clientX - startX.current;

          if (newOffset < 0) newOffset = 0; 
          if (newOffset > maxOffset + 30) newOffset = maxOffset + 30; 
          setOffset(newOffset);
        };
        const handleTouchEnd = () => {
          setIsDragging(false);

          else { setOffset(0); prevOffset.current = 0; }

        const handler = (e) => setIsDarkMode(e.matches);
        mediaQuery.addEventListener('change', handler);

      useEffect(() => {

      const [favorites, setFavorites] = useState([]);
      
      const initialLine = "18号线";

      const initialTimetable = generateTimetable(initialLine, initialDirIndex, initialStation, new Date());

      const [legs, setLegs] = useState([
        { 
          id: '1', line: initialLine, dirIndex: initialDirIndex, station: initialStation, 
          timetable: initialTimetable, targetTime: initialTimetable[0].timeStr, targetIsExpress: initialTimetable[0].isExpress
        }
      ]);

      // 实时获取下一班车数据供悬浮窗使用
      const eventsList = legs.map(leg => {
        const dirName = metroNetwork[leg.line].directions[leg.dirIndex].name;
        return {
          id: leg.id, title: `${leg.station} 上车`, subtitle: `${leg.line} ${dirName} ${leg.targetIsExpress ? '(快车)' : ''}`,
          time: leg.targetTime, lineThemeClass: metroNetwork[leg.line].btnTheme, isExpress: leg.targetIsExpress
        }
      }).sort((a, b) => a.time.localeCompare(b.time));

      let nextEventForPip = null;
      for (const ev of eventsList) {
        const [h, m] = ev.time.split(':').map(Number);
        const evDate = new Date(currentTime);
        evDate.setHours(h, m, 0, 0);
        if (currentTime.getHours() > 12 && h < 12 && evDate < currentTime) evDate.setDate(evDate.getDate() + 1);
        if (evDate > currentTime) { nextEventForPip = ev; break; }
      }

      const pipTimeDiffMs = nextEventForPip ? (new Date().setHours(nextEventForPip.time.split(':')[0], nextEventForPip.time.split(':')[1], 0, 0) - new Date()) : 0;
      let actualPipDiffMs = pipTimeDiffMs;
      // 修正跨天
      if (actualPipDiffMs < -43200000) actualPipDiffMs += 86400000;
      
      const mLeftPip = Math.floor(actualPipDiffMs / 60000);
      const sLeftPip = Math.floor((actualPipDiffMs % 60000) / 1000);
      const currentCountdownText = nextEventForPip && actualPipDiffMs > 0 ? `${mLeftPip}:${String(sLeftPip).padStart(2,'0')}` : "00:00";
      const currentSubtitle = nextEventForPip ? nextEventForPip.subtitle : "行程结束";

      // 修复黑科技：动态网页标题倒计时
      useEffect(() => {
        let timer;
        if (appState === 'countdown') {
          timer = setInterval(() => {
            setCurrentTime(new Date());
          }, 1000);
        } else {
          document.title = 'MetroRush';
        }
        return () => { if (timer) clearInterval(timer); };
      }, [appState]);

      useEffect(() => {
         if (appState === 'countdown') {
            if(nextEventForPip && actualPipDiffMs > 0){
               document.title = `⏳ ${mLeftPip}:${String(sLeftPip).padStart(2,'0')} - MetroRush`;
            } else {
               document.title = 'MetroRush';
            }
         }
      }, [currentTime, appState]);


      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(""), 3500);
      };

      const handleRefreshTimetable = () => {
        setIsRefreshing(true);
        setTimeout(() => {
          const now = new Date();
          setLegs(legs.map(leg => {
            const newTimeT = generateTimetable(leg.line, leg.dirIndex, leg.station, now);
            const stillExists = newTimeT.find(t => t.timeStr === leg.targetTime);
            return { ...leg, timetable: newTimeT, targetTime: stillExists ? stillExists.timeStr : newTimeT[0].timeStr, targetIsExpress: stillExists ? stillExists.isExpress : newTimeT[0].isExpress };
          }));
          setIsRefreshing(false);
          showToast("发车数据已同步");
        }, 800);
      };

      const handleLocate = () => {
        if (!navigator.geolocation) {
          showToast("您的设备不支持GPS定位");
          return;
        }
        setIsLocating(true);
        showToast("正在获取高精度 GPS 信号...");
        
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            let closestStation = null;
            let minDistance = Infinity;

            stationCoordinates.forEach(station => {
              const dist = getDistance(lat, lng, station.lat, station.lng);
              if (dist < minDistance) {
                minDistance = dist;
                closestStation = station;
              }
            });

            if (minDistance > 50) {
              showToast("您当前不在地铁覆盖范围内");
              setIsLocating(false);
              return;
            }

            if (closestStation) {
              const now = new Date();
              const newTimeT = generateTimetable(closestStation.line, 0, closestStation.station, now);
              
              setLegs([{ 
                id: Date.now().toString(), 
                line: closestStation.line, 
                dirIndex: 0, 
                station: closestStation.station, 
                timetable: newTimeT, 
                targetTime: newTimeT[0].timeStr, 
                targetIsExpress: newTimeT[0].isExpress
              }]);
              showToast(`定位成功！距 ${closestStation.station} 站约 ${minDistance.toFixed(1)} km`);
            }
            setIsLocating(false);
          },
          (error) => {
            showToast("定位失败，请确保开启位置权限");
            setIsLocating(false);
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      };

      const handleUpdateLeg = (id, field, value) => {
        const now = new Date(); 
        setLegs(legs.map(leg => {
          if (leg.id === id) {
            let updatedLeg = { ...leg, [field]: value };
            
            if (field === 'line') {
              updatedLeg.dirIndex = 0; 
              let newStation = metroNetwork[value].directions[0].stations[0];
              
              if (value === "7号线") {
                 newStation = "锦龙";
              } else if (value === "18号线") {
                 newStation = "南村万博";
              } else if (value === "佛山2号线") {
                 newStation = "南庄";
              } else if (value === "南海有轨1号线") {
                 updatedLeg.dirIndex = 1;
                 newStation = "康怡公园";
              }
              
              updatedLeg.station = newStation;
              const newTimeT = generateTimetable(value, updatedLeg.dirIndex, updatedLeg.station, now);
              updatedLeg.timetable = newTimeT;
              updatedLeg.targetTime = newTimeT[0].timeStr;
              updatedLeg.targetIsExpress = newTimeT[0].isExpress;

            } else if (field === 'dirIndex') {
               let newStation = metroNetwork[updatedLeg.line].directions[value].stations[0];
               if (updatedLeg.line === "7号线") newStation = "锦龙";
               else if (updatedLeg.line === "18号线") newStation = "南村万博";
               else if (updatedLeg.line === "佛山2号线" && value === 1) newStation = "广州南站";
               else if (updatedLeg.line === "南海有轨1号线" && value === 1) newStation = "康怡公园";

               updatedLeg.station = newStation;
               const newTimeT = generateTimetable(updatedLeg.line, value, updatedLeg.station, now);
               updatedLeg.timetable = newTimeT;
               updatedLeg.targetTime = newTimeT[0].timeStr;
               updatedLeg.targetIsExpress = newTimeT[0].isExpress;

            } else if (field === 'station') {
              const newTimeT = generateTimetable(updatedLeg.line, updatedLeg.dirIndex, value, now);
              updatedLeg.timetable = newTimeT;
              updatedLeg.targetTime = newTimeT[0].timeStr;
              updatedLeg.targetIsExpress = newTimeT[0].isExpress;
            }
            return updatedLeg;
          }
          return leg;
        }));
      };

      const handleTimeSelect = (legId, timeItem) => {
        setLegs(legs.map(leg => 
          leg.id === legId ? { ...leg, targetTime: timeItem.timeStr, targetIsExpress: timeItem.isExpress } : leg
        ));
      };

      const currentRouteHash = legs.map(l => `${l.line}-${l.dirIndex}-${l.station}-${l.targetTime}`).join('|');
      const isRouteFavorited = favorites.some(f => f.legs.map(l => `${l.line}-${l.dirIndex}-${l.station}-${l.targetTime}`).join('|') === currentRouteHash);

      const handleToggleFavorite = () => {
        const existingIndex = favorites.findIndex(f => f.legs.map(l => `${l.line}-${l.dirIndex}-${l.station}-${l.targetTime}`).join('|') === currentRouteHash);

        if (existingIndex >= 0) {
          const newFavs = [...favorites];
          newFavs.splice(existingIndex, 1);
          setFavorites(newFavs);
          showToast("已取消收藏路线");
        } else {
          setFavorites([...favorites, {
            id: Date.now().toString(),
            legs: legs.map(l => ({ line: l.line, dirIndex: l.dirIndex, station: l.station, targetTime: l.targetTime }))
          }]);
          showToast("完整路线已收藏");
        }
      };

      const handleAddFromFavorite = (fav) => {
        const now = new Date();
        const newLegs = fav.legs.map((favLeg, idx) => {
          const [h, m] = favLeg.targetTime.split(':').map(Number);
          let baseTime = new Date(now);
          baseTime.setHours(h, m - 5, 0, 0); 
          
          const newTimeT = generateTimetable(favLeg.line, favLeg.dirIndex, favLeg.station, baseTime);
          
          let exactMatch = newTimeT.find(t => t.timeStr === favLeg.targetTime);
          if (!exactMatch) {
             newTimeT[0].timeStr = favLeg.targetTime;
             exactMatch = newTimeT[0];
          }

          return {
            id: Date.now().toString() + idx,
            line: favLeg.line,
            dirIndex: favLeg.dirIndex,
            station: favLeg.station,
            timetable: newTimeT,
            targetTime: favLeg.targetTime,
            targetIsExpress: exactMatch.isExpress
          };
        });

        setLegs(newLegs);
        setShowFavoritesModal(false);
        showToast("已成功加载收藏路线");
      };

      const handleAddLeg = () => {
        const lastLeg = legs[legs.length - 1];
        let baseTime = new Date();
        if (lastLeg && lastLeg.targetTime) {
          const [h, m] = lastLeg.targetTime.split(':').map(Number);
          baseTime = new Date();
          baseTime.setHours(h, m + 15, 0, 0); 
        }
        const newLine = "7号线"; 
        const newDir = 0;
        const newStation = "锦龙"; 
        const newTimeT = generateTimetable(newLine, newDir, newStation, baseTime);

        setLegs([...legs, { 
          id: Date.now().toString(), line: newLine, dirIndex: newDir, station: newStation, 
          timetable: newTimeT, targetTime: newTimeT[0].timeStr, targetIsExpress: newTimeT[0].isExpress
        }]);
      };

      const handleRemoveLeg = (id) => {
        if (legs.length > 1) {
          setLegs(legs.filter(leg => leg.id !== id));
          showToast("路线已移除");
        }
      };

      const startCountdown = () => {
        if (legs.every(leg => leg.targetTime !== "")) {
          setCurrentTime(new Date()); 
          setAppState('countdown');
        } else showToast("请为所有行程选择班次");
      };

      // --- 全机型自适应双轨悬浮引擎逻辑 ---
      const canvasRef = useRef(null);
      const videoRef = useRef(null);
      const [isPipActive, setIsPipActive] = useState(false);
      const [showInAppPip, setShowInAppPip] = useState(false);

      // 使用 requestAnimationFrame 彻底解决 Canvas 画动画帧的闪烁问题
      const latestDataRef = useRef({ currentTime, appState, nextEventForPip, mLeftPip, sLeftPip });
      useEffect(() => {
        latestDataRef.current = { currentTime, appState, nextEventForPip, mLeftPip, sLeftPip };
      }, [currentTime, appState, nextEventForPip, mLeftPip, sLeftPip]);

      useEffect(() => {
        if (!canvasRef.current) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationId;

        const drawLoop = () => {
          const { appState, nextEventForPip, mLeftPip, sLeftPip } = latestDataRef.current;
          
          if (appState === 'countdown') {
            ctx.fillStyle = '#020617'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (nextEventForPip) {
              ctx.fillStyle = '#38bdf8'; 
              ctx.font = 'bold 24px -apple-system, sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(nextEventForPip.subtitle, canvas.width/2, 45);

              ctx.fillStyle = mLeftPip < 2 ? '#ef4444' : '#ffffff'; 
              ctx.font = 'bold 88px monospace';
              ctx.fillText(`${mLeftPip}:${String(sLeftPip).padStart(2, '0')}`, canvas.width/2, 135);

              ctx.fillStyle = '#94a3b8';
              ctx.font = '22px -apple-system, sans-serif';
              ctx.fillText(nextEventForPip.title, canvas.width/2, 180);
            } else {
              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 36px -apple-system, sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText('行程圆满结束', canvas.width/2, canvas.height/2 + 10);
            }
          }
          animationId = requestAnimationFrame(drawLoop);
        };
        drawLoop();
        return () => cancelAnimationFrame(animationId);
      }, []);

      const togglePip = async () => {
        if (document.pictureInPictureEnabled && videoRef.current && canvasRef.current && canvasRef.current.captureStream) {
          try {
            if (document.pictureInPictureElement) {
              await document.exitPictureInPicture();
              setIsPipActive(false);
            } else {
              if (!videoRef.current.srcObject) {
                 videoRef.current.srcObject = canvasRef.current.captureStream(30);
              }
              await videoRef.current.play();
              await videoRef.current.requestPictureInPicture();
              setIsPipActive(true);
            }
            return; // 原生画中画成功，跳出
          } catch (err) {
            console.warn("系统限制了原生画中画，自动降级为内嵌悬浮窗");
            // 静默失败，继续往下走降级逻辑
          }
        }
        
        // 智能降级：全机型通用的纯前端应用内悬浮窗
        setShowInAppPip(!showInAppPip);
      };

      if (appState === 'setup') {
        return (
          <div className="min-h-screen bg-slate-50 dark:bg-slate-950 font-sans text-slate-800 dark:text-slate-200 flex flex-col items-center justify-start relative transition-colors duration-300">
            
            {isMapLoading && (
              <div className="fixed inset-0 z-[500] bg-slate-900/90 backdrop-blur-md flex flex-col items-center justify-center text-white animate-fade-in">
                 <Icon name="loader-2" className="w-12 h-12 animate-spin mb-4 text-teal-400" />
                 <div className="text-xl font-bold tracking-widest font-sans">MetroRush</div>
                 <div className="text-xs text-white/60 mt-2 tracking-widest uppercase">Connecting to Map Engine</div>
              </div>
            )}

            {toastMsg && (
              <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[300] bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-5 py-2.5 rounded-full shadow-lg text-sm font-bold flex items-center gap-2 animate-slide-up whitespace-nowrap transition-colors">
                <Icon name="info" className="w-4 h-4 text-blue-400 dark:text-blue-500 shrink-0" /> {toastMsg}
              </div>
            )}

            <div className="w-full max-w-md bg-white dark:bg-slate-900 shadow-sm flex flex-col h-screen overflow-hidden relative transition-colors duration-300">
              
              <div className="flex items-center justify-between px-4 py-3 bg-white dark:bg-slate-900 z-50 shadow-sm shrink-0 border-b border-slate-100 dark:border-slate-800 transition-colors">
                 
                 <div className="flex items-center gap-1.5">
                   <button onClick={() => setIsDarkMode(!isDarkMode)} className="flex items-center justify-center p-2 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                      <Icon name={isDarkMode ? "sun" : "moon"} className="w-5 h-5" />
                   </button>
                 </div>
                 
                 <div className="flex items-center gap-2 flex-wrap justify-end">
                   <button onClick={handleLocate} disabled={isLocating} className="flex items-center justify-center gap-1 bg-white dark:bg-slate-800 border border-purple-200 dark:border-purple-800/50 text-purple-600 dark:text-purple-400 px-3 py-1.5 rounded-full text-[11px] font-bold shadow-sm hover:bg-purple-50 dark:hover:bg-slate-700 transition-colors disabled:opacity-70 pointer-events-auto">
                      <Icon name="navigation" className={`w-3.5 h-3.5 ${isLocating ? 'animate-pulse' : ''}`} /> 定位
                   </button>
                   <button onClick={handleRefreshTimetable} disabled={isRefreshing} className="flex items-center justify-center gap-1 bg-white dark:bg-slate-800 border border-blue-200 dark:border-blue-800/50 text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-full text-[11px] font-bold shadow-sm hover:bg-blue-50 dark:hover:bg-slate-700 transition-colors disabled:opacity-70 pointer-events-auto">
                      <Icon name="refresh-cw" className={`w-3.5 h-3.5 ${isRefreshing ? 'animate-spin' : ''}`} /> 刷新
                   </button>
                   
                   <a 
                     href="https://ipt.kopisee.com/canton/zh-cn/gzmtr-system-map" 
                     target="_blank" 
                     rel="noopener noreferrer"
                     onClick={() => {
                       setIsMapLoading(true);
                       setTimeout(() => setIsMapLoading(false), 2500); 
                     }}
                     className="flex items-center justify-center gap-1 bg-white dark:bg-slate-800 border border-teal-200 dark:border-teal-800/50 text-teal-600 dark:text-teal-400 px-3 py-1.5 rounded-full text-[11px] font-bold shadow-sm hover:bg-teal-50 dark:hover:bg-slate-700 transition-colors pointer-events-auto cursor-pointer"
                   >
                      <Icon name="map" className="w-3.5 h-3.5" /> 图网
                   </a>

                   <button onClick={() => setShowFavoritesModal(true)} className="flex items-center justify-center gap-1 bg-white dark:bg-slate-800 border border-amber-200 dark:border-amber-800/50 text-amber-600 dark:text-amber-500 px-3 py-1.5 rounded-full text-[11px] font-bold shadow-sm hover:bg-amber-50 dark:hover:bg-slate-700 transition-colors pointer-events-auto">
                      <Icon name="star" className="w-3.5 h-3.5 fill-current" /> 收藏
                   </button>
                 </div>
              </div>

              <div className="p-4 md:p-6 space-y-6 overflow-y-auto flex-1 relative bg-slate-50 dark:bg-slate-950 hide-scrollbar pb-12 pt-4 transition-colors duration-300">
                <div className="space-y-6 relative">
                  {legs.map((leg, index) => {
                    const currentNetworkObj = metroNetwork[leg.line];
                    const activeTheme = currentNetworkObj.theme;
                    const activeBtnTheme = currentNetworkObj.btnTheme;
                    const stationList = currentNetworkObj.directions[leg.dirIndex].stations;
                    const firstLastData = getPreciseFirstLast(leg.line, leg.dirIndex, leg.station);

                    return (
                      <div key={leg.id} className="relative z-10" style={{ zIndex: legs.length - index }}>
                        {index !== legs.length - 1 && <div className="absolute left-[35px] top-[40px] bottom-[-40px] w-0.5 bg-slate-200 dark:bg-slate-800 z-0 pointer-events-none transition-colors"></div>}

                        <SwipeableLegCard leg={leg} isRemovable={legs.length > 1} activeTheme={activeTheme} isFavorited={isRouteFavorited} onToggleFavorite={handleToggleFavorite} onRemove={() => handleRemoveLeg(leg.id)}>
                          <div className="flex justify-between items-center mb-5">
                             <div className="flex items-center w-full">
                               <CustomLineSelect legId={leg.id} value={leg.line} onChange={handleUpdateLeg} />
                             </div>
                             {isRouteFavorited && <Icon name="star" className="w-5 h-5 text-amber-500 fill-current opacity-80 shrink-0 absolute right-5 top-5 pointer-events-none" />}
                          </div>

                          <div className="space-y-3">
                            <div className="bg-slate-50 dark:bg-slate-900/40 p-2 rounded-xl flex items-center gap-2 border border-black/5 dark:border-white/5 shadow-sm no-swipe transition-colors">
                              <Icon name="arrow-left-right" className="w-4 h-4 text-black/40 dark:text-white/40 ml-2 shrink-0" />
                              <select 
                                value={leg.dirIndex}
                                onChange={(e) => handleUpdateLeg(leg.id, 'dirIndex', Number(e.target.value))}
                                className="flex-1 bg-transparent text-sm font-sans font-normal p-1 outline-none w-full truncate text-slate-800 dark:text-slate-200"
                              >
                                {currentNetworkObj.directions.map((dir, idx) => (
                                  <option key={idx} value={idx}>{dir.name}</option>
                                ))}
                              </select>
                            </div>

                            <div className="no-swipe">
                               <label className="block text-[10px] font-bold uppercase tracking-wider mb-1.5 opacity-70 ml-1 text-slate-600 dark:text-slate-400">在此站上车</label>
                               <select 
                                 value={leg.station}
                                 onChange={(e) => handleUpdateLeg(leg.id, 'station', e.target.value)}
                                 className="w-full bg-slate-50 dark:bg-slate-900/40 border border-black/10 dark:border-white/10 rounded-xl p-3.5 text-base font-sans font-normal outline-none focus:ring-2 focus:ring-black/10 shadow-sm transition-all text-slate-800 dark:text-slate-200"
                               >
                                 {stationList.map(s => <option key={s} value={s}>{s}</option>)}
                               </select>
                            </div>
                          </div>

                          <NativeSwipeableTimetable leg={leg} activeBtnTheme={activeBtnTheme} onTimeSelect={handleTimeSelect} firstLastData={firstLastData} />
                        </SwipeableLegCard>
                      </div>
                    );
                  })}
                </div>
                
                <div className="pt-6 relative z-10 space-y-4">
                  <button onClick={handleAddLeg} className="w-full py-4 border-2 border-dashed border-slate-300 dark:border-slate-700 text-slate-500 dark:text-slate-400 rounded-2xl flex items-center justify-center gap-2 hover:bg-white dark:hover:bg-slate-900 transition-colors text-sm font-bold shadow-sm">
                    <Icon name="plus" className="w-5 h-5" /> 添加换乘
                  </button>
                  
                  {legs.length > 1 && (
                     <p className="text-center text-[10px] text-slate-400 dark:text-slate-500 opacity-80 pt-1 pb-1">
                        向右滑动卡片可删除或收藏路线 <ChevronRightSvg className="w-3 h-3 inline ml-0.5 opacity-60" />
                     </p>
                  )}

                  <button onClick={startCountdown} className="w-full mt-6 py-4 bg-slate-900 dark:bg-slate-100 hover:bg-black dark:hover:bg-white text-white dark:text-slate-900 rounded-2xl flex items-center justify-center gap-2 font-bold text-lg transition-transform active:scale-[0.98] shadow-xl">
                    <Icon name="play" className="w-5 h-5 fill-current" /> 启动 MetroRush
                  </button>
                  <div className="text-center text-[10px] font-mono tracking-tighter text-slate-400 dark:text-slate-600 opacity-60 pt-2 pb-4">v1.9.4</div>
                </div>
              </div>

            </div>

            {/* 收藏路线流 Modal */}
            {showFavoritesModal && (
              <div className="absolute inset-0 z-[150] flex flex-col justify-end">
                <div className="absolute inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm transition-opacity" onClick={() => setShowFavoritesModal(false)}></div>
                <div className="relative bg-white dark:bg-slate-900 rounded-t-3xl p-6 shadow-2xl animate-slide-up max-h-[70vh] overflow-y-auto w-full max-w-md mx-auto transition-colors duration-300">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-lg font-bold flex items-center gap-2 text-slate-800 dark:text-slate-100">
                      <Icon name="star" className="w-5 h-5 text-amber-500 fill-current" /> 收藏路线夹
                    </h3>
                    <button onClick={() => setShowFavoritesModal(false)} className="p-2 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                      <Icon name="x" className="w-5 h-5 text-slate-500 dark:text-slate-400" />
                    </button>
                  </div>
                  
                  {favorites.length === 0 ? (
                    <div className="py-12 text-center text-slate-400 dark:text-slate-500 text-sm">
                      <Icon name="bookmark" className="w-12 h-12 mx-auto mb-3 opacity-20" />
                      暂无收藏<br/>在主界面向右滑动卡片即可收藏完整路线
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {favorites.map(fav => (
                        <div key={fav.id} onClick={() => handleAddFromFavorite(fav)} className="p-4 border border-slate-100 dark:border-slate-800 rounded-2xl cursor-pointer shadow-sm hover:border-slate-300 dark:hover:border-slate-600 transition-all bg-white dark:bg-slate-800/50">
                           <div className="space-y-3 relative">
                              {fav.legs.map((leg, idx) => {
                                 const themeStr = metroNetwork[leg.line].btnTheme.split(' ')[0];
                                 return (
                                   <div key={idx} className="flex items-center gap-3 relative">
                                      {/* 连接线 */}
                                      {idx !== fav.legs.length - 1 && <div className="absolute left-2.5 top-6 bottom-[-16px] w-0.5 bg-slate-200 dark:bg-slate-700 z-0"></div>}
                                      
                                      <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[8px] font-bold text-white shadow-sm z-10 ${themeStr}`}>
                                         {getLineShortName(leg.line)[0]}
                                      </div>
                                      <div className="flex-1 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-800">
                                         <span className="font-bold text-sm text-slate-800 dark:text-slate-200">{leg.station}</span>
                                         <span className="font-mono text-sm font-bold text-slate-600 dark:text-slate-400">{leg.targetTime}</span>
                                      </div>
                                   </div>
                                 )
                              })}
                           </div>
                           <div className="mt-3 pt-3 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
                              <span className="text-xs text-slate-400 dark:text-slate-500">点击应用此路线</span>
                              <Icon name="arrow-right-circle" className="w-5 h-5 text-teal-500" />
                           </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-100 dark:bg-[#0a0f18] p-4 md:p-8 font-sans flex flex-col items-center justify-start pt-10 relative overflow-hidden transition-colors duration-500">
          
          <canvas ref={canvasRef} width="400" height="200" className="hidden"></canvas>
          <video ref={videoRef} muted playsInline className="hidden"></video>

          {showInAppPip && (
            <InAppPipWindow 
              timeText={currentCountdownText} 
              subtitle={currentSubtitle} 
              onClose={() => setShowInAppPip(false)} 
            />
          )}

          {isMapLoading && (
            <div className="fixed inset-0 z-[500] bg-slate-900/90 backdrop-blur-md flex flex-col items-center justify-center text-white animate-fade-in">
               <Icon name="loader-2" className="w-12 h-12 animate-spin mb-4 text-teal-400" />
               <div className="text-xl font-bold tracking-widest font-sans">MetroRush</div>
               <div className="text-xs text-white/60 mt-2 tracking-widest uppercase">Connecting to Map Engine</div>
            </div>
          )}

          <div className="absolute inset-0 bg-[linear-gradient(to_right,#0000000a_1px,transparent_1px),linear-gradient(to_bottom,#0000000a_1px,transparent_1px)] dark:bg-[linear-gradient(to_right,#ffffff0a_1px,transparent_1px),linear-gradient(to_bottom,#ffffff0a_1px,transparent_1px)] bg-[size:24px_24px] pointer-events-none transition-colors duration-500"></div>
          
          <div className="w-full max-w-md relative z-10">
            <div className="flex justify-between items-center mb-6">
              <div className="flex items-center gap-2 text-slate-800 dark:text-white transition-colors">
                <Icon name="activity" className="w-6 h-6 text-blue-500 dark:text-blue-400" />
                <h1 className="text-xl font-bold tracking-wider font-sans">MetroRush 监控</h1>
              </div>
              <div className="flex items-center gap-2">
                 <button 
                   onClick={togglePip}
                   className={`flex items-center gap-1 text-sm backdrop-blur px-3 py-2 rounded-full transition-colors font-sans tracking-normal border shadow-sm ${isPipActive || showInAppPip ? 'bg-teal-500 text-white border-teal-600' : 'bg-white/80 dark:bg-slate-800/80 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 border-slate-200 dark:border-slate-700'}`}
                 >
                   <Icon name="picture-in-picture" className="w-4 h-4" /> 悬浮
                 </button>
                 <button onClick={() => setAppState('setup')} className="flex items-center gap-1 text-sm bg-white/80 dark:bg-slate-800/80 backdrop-blur px-4 py-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 shadow-sm font-sans tracking-normal">
                   <Icon name="settings" className="w-4 h-4" /> 调整
                 </button>
              </div>
            </div>

            <div className={`rounded-3xl shadow-2xl p-8 mb-8 text-center relative overflow-hidden ${nextEventForPip ? nextEventForPip.lineThemeClass : 'bg-slate-800'} transition-colors duration-500`}>
              <Icon name="clock" className="absolute -right-12 -top-12 w-64 h-64 text-white opacity-[0.07]" />
              {nextEventForPip ? (
                <div className="relative z-10">
                  <div className="inline-flex flex-col items-center gap-1 mb-4">
                     <span className="bg-black/20 text-white/90 px-3 py-1 rounded-full text-sm backdrop-blur-md flex items-center gap-1.5 shadow-inner">
                       <Icon name="navigation" className="w-3.5 h-3.5" /> {currentSubtitle}
                     </span>
                     <h2 className="text-2xl font-bold text-white mt-2 drop-shadow-md font-sans tracking-normal">{nextEventForPip.title}</h2>
                  </div>
                  <div className="flex items-baseline justify-center gap-2 mt-2 mb-2">
                    <span className="text-8xl font-black tracking-tighter tabular-nums drop-shadow-lg text-white">{mLeftPip}</span>
                    <span className="text-2xl font-bold text-white/70">分</span>
                    <span className="text-6xl font-bold tracking-tighter tabular-nums text-white/90 ml-2 w-20 text-left drop-shadow-md">{String(sLeftPip).padStart(2, '0')}</span>
                    <span className="text-xl font-bold text-white/70">秒</span>
                  </div>
                  {mLeftPip < 2 && (
                    <div className="mt-6 inline-flex items-center gap-2 bg-red-500 dark:bg-red-600 text-white px-5 py-2.5 rounded-full font-bold text-sm shadow-[0_0_20px_rgba(239,68,68,0.5)] animate-pulse">
                      <Icon name="alert-circle" className="w-5 h-5" />列车即将进站，请准备乘车
                    </div>
                  )}
                </div>
              ) : (
                <div className="py-12 relative z-10">
                  <Icon name="check" className="w-20 h-20 mx-auto mb-4 text-white/90 drop-shadow-lg" />
                  <h2 className="text-3xl font-bold mb-2 text-white font-sans tracking-normal">行程圆满结束</h2>
                  <p className="text-white/70 text-lg">欢迎搭乘</p>
                </div>
              )}
            </div>

            <div className="bg-white/90 dark:bg-slate-900/80 backdrop-blur-xl rounded-3xl p-6 border border-slate-200 dark:border-slate-800 shadow-xl transition-colors duration-500">
              <div className="space-y-0 relative">
                <div className="absolute left-[31px] top-6 bottom-6 w-0.5 bg-slate-200 dark:bg-slate-700 z-0 transition-colors"></div>
                {sortedEvents.map((ev, index) => {
                  const evDate = getEventDate(ev.time);
                  const isPast = evDate <= currentTime;
                  const isNext = nextEventForPip && ev.id === nextEventForPip.id;
                  return (
                    <div key={ev.id} className="relative z-10 flex items-start gap-5 pb-10 last:pb-0 group">
                      <div className="w-16 text-right pt-0.5 shrink-0">
                        <span className={`font-mono text-lg font-bold transition-colors ${isPast ? 'text-slate-400 dark:text-slate-600' : isNext ? 'text-slate-800 dark:text-white drop-shadow-md' : 'text-slate-500 dark:text-slate-400'}`}>{ev.time}</span>
                      </div>
                      <div className="relative flex flex-col items-center justify-center mt-1.5 shrink-0">
                        {isNext ? (
                          <div className="relative flex items-center justify-center w-6 h-6">
                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-400 dark:bg-white opacity-40"></span>
                            <div className={`w-4 h-4 rounded-full ring-4 ring-white dark:ring-slate-900 shadow-[0_0_15px_rgba(0,0,0,0.1)] dark:shadow-[0_0_15px_rgba(255,255,255,0.4)] transition-colors ${ev.lineThemeClass.split(' ')[0]}`}></div>
                          </div>
                        ) : isPast ? (
                          <div className="w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-700 ring-4 ring-white dark:ring-slate-900 mt-1 transition-colors"></div>
                        ) : (
                          <div className="w-3 h-3 rounded-full bg-slate-400 dark:bg-slate-500 ring-4 ring-white dark:ring-slate-900 mt-1 transition-colors"></div>
                        )}
                      </div>
                      <div className={`flex-1 pt-0 transition-colors ${isPast ? 'opacity-50 line-through decoration-slate-400 dark:decoration-slate-600' : isNext ? 'opacity-100' : 'opacity-80'}`}>
                        <div className={`text-lg font-bold mb-0.5 flex items-center gap-2 font-sans tracking-normal transition-colors ${isPast ? 'text-slate-500 dark:text-slate-500' : 'text-slate-800 dark:text-white'}`}>
                          {ev.title} 
                          {ev.isExpress && <span className="bg-red-100 dark:bg-red-500/20 text-red-600 dark:text-red-400 text-[10px] px-1.5 py-0.5 rounded border border-red-200 dark:border-red-500/30">快车</span>}
                        </div>
                        <div className="text-xs font-medium text-slate-500 dark:text-slate-400 font-sans tracking-normal transition-colors">{ev.subtitle}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
